sudo: false
language: php
php:
  - 7.0
  # TODO: Upgrade to PHP 8.x once bundles support it (see composer.json)

cache:
    directories:
        - $HOME/download-cache

services:
  - redis-server

addons:
  apt:
    packages:
    - nginx
    - realpath

  hosts:
    - localhost

before_install:
    - mkdir -p $HOME/download-cache
    - mkdir -p build/logs

install:
    # Install system dependencies: databases, Solr cores, nginx
    - bash ci/travis/nginx/install-nginx.sh
    - bash ci/travis/install.sh
    # Install PHP dependencies
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install --no-interaction

before_script:
    # Bootstrap CASEBOX environment
    - echo "CASEBOX | Index Casebox default core."
    - bin/console casebox:solr:update --all=true --env=default
    - echo "CASEBOX | Clear cache."
    - bin/console ca:cl --env=default
    - echo "CASEBOX | Update Casebox database schema."
    - bin/console doctrine:schema:update --force

script:
    # Run the full test suite (unit + integration + coverage)
    - bash tests/run.sh

after_success:
    # Upload coverage report to Coveralls
    - php vendor/bin/coveralls -v
